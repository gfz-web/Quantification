[build]
  publish = "public"
  command = "mkdir -p public/lib && cp lib/notificationService.js public/lib/notificationService.js"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/quote"
  to = "/.netlify/functions/quote"
  status = 200

[[redirects]]
  from = "/api/sina-kline"
  to = "/.netlify/functions/sina-kline"
  status = 200
